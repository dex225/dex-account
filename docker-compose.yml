services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - 3000
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DEX_JWT_SECRET=${DEX_JWT_SECRET}
      - DEX_EMERGENCY_API_KEY=${DEX_EMERGENCY_API_KEY}
      - DEX_ALLOWED_ORIGINS=${DEX_ALLOWED_ORIGINS}
      - DEX_AUTO_MIGRATE=${DEX_AUTO_MIGRATE:-false}
      - DEX_SETUP_TOKEN=${DEX_SETUP_TOKEN}
      - DEX_NOTIFIER_URL=${DEX_NOTIFIER_URL}
      - DEX_NOTIFIER_API_KEY=${DEX_NOTIFIER_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - dokploy-network

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    expose:
      - 80
    environment:
      - VITE_API_TARGET=https://api.agenciadex.com
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
